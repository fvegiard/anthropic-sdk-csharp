name: Create releases
on:
  schedule:
    - cron: '0 5 * * *' # every day at 5am UTC
  push:
    branches:
      - main

jobs:
  release:
    name: release
    if: github.ref == 'refs/heads/main' && github.repository == 'anthropics/anthropic-sdk-csharp'
    runs-on: ubuntu-latest
    environment: production-release

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - uses: stainless-api/trigger-release-please@bb6677c5a04578eec1ccfd9e1913b5b78ed64c61 # v1.4.0
        id: release
        with:
          repo: ${{ github.event.repository.full_name }}
          stainless-api-key: ${{ secrets.STAINLESS_API_KEY }}

      - name: Set up .NET
        if: ${{ steps.release.outputs.releases_created }}
        uses: actions/setup-dotnet@c2fa09f4bde5ebb9d1777cf28262a3eb3db3ced7 # v5.2.0
        with:
          dotnet-version: '8.0.x'

      - name: Build and pack
        if: ${{ steps.release.outputs.releases_created }}
        run: dotnet pack
          --configuration Release
          --output "${{github.workspace}}/artifacts/packages"

      - name: Publish package to nuget.org
        if: ${{ steps.release.outputs.releases_created }}
        run: dotnet nuget push
          $(find ${{ github.workspace }}/artifacts/packages/*.nupkg ! -name "*.symbols.nupkg")
          --source https://api.nuget.org/v3/index.json
          --api-key $NUGET_API_KEY
        env:
          NUGET_API_KEY: ${{ secrets.ANTHROPIC_NUGET_API_KEY || secrets.NUGET_API_KEY }}
